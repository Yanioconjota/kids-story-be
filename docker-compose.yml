services:
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file: services/api-gateway/.env
    depends_on:
      - moderation-service
      - llm-service
      - story-service

  moderation-service:
    build:
      context: .
      dockerfile: services/moderation-service/Dockerfile
    ports:
      - "8001:8001"
    env_file: services/moderation-service/.env

  llm-service:
    build:
      context: .
      dockerfile: services/llm-service/Dockerfile
    ports:
      - "8002:8002"
    env_file: services/llm-service/.env

  story-service:
    build:
      context: .
      dockerfile: services/story-service/Dockerfile
    ports:
      - "8003:8003"
    env_file: services/story-service/.env
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mongo_data:
